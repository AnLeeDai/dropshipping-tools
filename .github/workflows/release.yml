name: Release Desktop App

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
      - "electron-builder.config.cjs"
      - "scripts/generate-download-page.cjs"
      - "release.config.json"
      - "scripts/stage-update-feed.cjs"
      - "scripts/prepare-release.cjs"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-pages:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Prepare release metadata
        id: release
        run: node scripts/prepare-release.cjs

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Windows distributables
        run: npm run make

      - name: Stage update feed assets
        run: node scripts/stage-update-feed.cjs

      - name: Generate download page
        run: node scripts/generate-download-page.cjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Assemble GitHub Pages artifact
        run: |
          $ErrorActionPreference = "Stop"
          $pagesArtifactDir = Join-Path (Resolve-Path "out").Path "pages-publish"
          $feedSource = (Resolve-Path "out/update-feed").Path
          $siteSource = (Resolve-Path "out/pages-site").Path
          $targetFeedDir = Join-Path $pagesArtifactDir "updates/win/x64"

          if (Test-Path $pagesArtifactDir) {
            Remove-Item -LiteralPath $pagesArtifactDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $targetFeedDir -Force | Out-Null
          Copy-Item -Path (Join-Path $siteSource "*") -Destination $pagesArtifactDir -Recurse -Force
          Copy-Item -Path (Join-Path $feedSource "*") -Destination $targetFeedDir -Recurse -Force
          New-Item -ItemType File -Path (Join-Path $pagesArtifactDir ".nojekyll") -Force | Out-Null

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out/pages-publish

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
