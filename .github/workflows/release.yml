name: Release Desktop App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Prepare release metadata
        id: release
        run: node scripts/prepare-release.cjs

      - name: Ensure release version is new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Error "Release tag $tag already exists. Increase release.config.json version before merging to main."
            exit 1
          }

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Windows distributables
        run: npm run make

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.release_name }}
          body_path: ${{ steps.release.outputs.notes_file }}
          draft: false
          prerelease: false
          files: |
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/RELEASES
            out/make/**/*.zip
