name: Phat hanh ung dung native

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
      - "DropshippingTools.Native/**"
      - "DropshippingTools.Native.sln"
      - "release.config.json"
      - "scripts/build-velopack-release.ps1"
      - "scripts/generate-download-page.ps1"
      - "readme.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-pages:
    name: Build and package release site
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DropshippingTools.Native.sln

      - name: Build
        run: dotnet build DropshippingTools.Native.sln --configuration Release --no-restore

      - name: Build Velopack release
        shell: pwsh
        run: ./scripts/build-velopack-release.ps1 -Configuration Release -Runtime win-x64

      - name: Generate download page
        shell: pwsh
        run: ./scripts/generate-download-page.ps1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Assemble GitHub Pages artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $releaseConfig = Get-Content -LiteralPath "release.config.json" -Raw | ConvertFrom-Json
          [xml]$projectXml = Get-Content -LiteralPath "DropshippingTools.Native\DropshippingTools.Native.csproj"

          $feedPath = [string]$releaseConfig.site.updateFeedPath
          $channel = [string]($projectXml.Project.PropertyGroup.VelopackChannel | Select-Object -First 1)
          $vpk = (Resolve-Path ".\.tools\vpk\vpk.exe").Path
          $pagesArtifactDir = Join-Path (Resolve-Path "out").Path "pages-publish"
          $siteSource = (Resolve-Path "out/pages-site").Path
          $releaseSource = (Resolve-Path "out/velopack/win-x64").Path
          $targetFeedDir = Join-Path $pagesArtifactDir $feedPath.Trim('/')

          if ([string]::IsNullOrWhiteSpace($feedPath) -or [string]::IsNullOrWhiteSpace($channel)) {
            throw "Missing update feed path or Velopack channel."
          }

          if (Test-Path -LiteralPath $pagesArtifactDir) {
            Remove-Item -LiteralPath $pagesArtifactDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $pagesArtifactDir -Force | Out-Null
          Copy-Item -Path (Join-Path $siteSource "*") -Destination $pagesArtifactDir -Recurse -Force

          & $vpk upload local --outputDir $releaseSource --channel $channel --path $targetFeedDir --regenerate
          if ($LASTEXITCODE -ne 0) {
            throw "vpk upload local failed with exit code $LASTEXITCODE"
          }

          New-Item -ItemType File -Path (Join-Path $pagesArtifactDir ".nojekyll") -Force | Out-Null

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out/pages-publish

  deploy-pages:
    name: Deploy release site
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
