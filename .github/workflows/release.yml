name: Phát hành ứng dụng native

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
      - "DropshippingTools.Native/**"
      - "DropshippingTools.Native.sln"
      - "release.config.json"
      - "scripts/stage-update-feed.ps1"
      - "scripts/generate-download-page.ps1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-pages:
    name: Xây dựng và đóng gói trang phát hành
    runs-on: windows-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Khôi phục gói
        run: dotnet restore DropshippingTools.Native.sln

      - name: Biên dịch
        run: dotnet build DropshippingTools.Native.sln --configuration Release --no-restore

      - name: Phát hành ứng dụng Windows một tệp
        run: dotnet publish DropshippingTools.Native\DropshippingTools.Native.csproj --configuration Release --framework net8.0-windows --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --output out\publish\win-x64

      - name: Chuẩn bị nguồn cấp cập nhật
        shell: pwsh
        run: ./scripts/stage-update-feed.ps1

      - name: Tạo trang tải xuống
        shell: pwsh
        run: ./scripts/generate-download-page.ps1

      - name: Cấu hình GitHub Pages
        uses: actions/configure-pages@v5

      - name: Ghép gói GitHub Pages
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pagesArtifactDir = Join-Path (Resolve-Path "out").Path "pages-publish"
          $feedSource = (Resolve-Path "out/update-feed").Path
          $siteSource = (Resolve-Path "out/pages-site").Path
          $targetFeedDir = Join-Path $pagesArtifactDir "updates/win/x64"

          if (Test-Path -LiteralPath $pagesArtifactDir) {
            Remove-Item -LiteralPath $pagesArtifactDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $targetFeedDir -Force | Out-Null
          Copy-Item -Path (Join-Path $siteSource "*") -Destination $pagesArtifactDir -Recurse -Force
          Copy-Item -Path (Join-Path $feedSource "*") -Destination $targetFeedDir -Recurse -Force
          New-Item -ItemType File -Path (Join-Path $pagesArtifactDir ".nojekyll") -Force | Out-Null

      - name: Tải gói GitHub Pages lên
        uses: actions/upload-pages-artifact@v4
        with:
          path: out/pages-publish

  deploy-pages:
    name: Triển khai trang phát hành
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Triển khai lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
